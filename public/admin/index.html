<style>
:root {
  --cream: oklch(0.972 0.014 80);
  --leather: oklch(0.55 0.13 45);
  --leather-deep: oklch(0.36 0.09 40);
  --sage: oklch(0.78 0.045 135);
  --background: oklch(0.978 0.011 85);
  --foreground: oklch(0.24 0.04 40);
  --muted: oklch(0.95 0.014 80);
  --muted-fg: oklch(0.48 0.025 50);
  --border: oklch(0.88 0.022 70);
  --destructive: oklch(0.55 0.2 25);
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-body: "Inter", system-ui, sans-serif;
  --radius: 0.5rem;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--background);
  color: var(--foreground);
  font-family: var(--font-body);
  font-size: 0.9375rem;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; line-height: 1.15; }
h1 { font-size: 2rem; }
h2 { font-size: 1.5rem; }
h3 { font-size: 1.125rem; }

.app-header {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title { font-family: var(--font-body); font-weight: 500; font-size: 0.9375rem; }
.main { max-width: 52rem; margin: 0 auto; padding: 2rem 1.25rem 6rem; }

.btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.5rem 1rem; border-radius: var(--radius);
  font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
  cursor: pointer; border: none;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--leather-deep); color: white; }
.btn-primary:hover:not(:disabled) { opacity: 0.88; }
.btn-secondary { background: var(--muted); color: var(--foreground); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--border); }
.btn-ghost { background: transparent; color: var(--muted-fg); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--muted); color: var(--foreground); }
.btn-danger { background: var(--destructive); color: white; }
.btn-sm { padding: 0.25rem 0.625rem; font-size: 0.8125rem; }

.field { display: flex; flex-direction: column; gap: 0.375rem; }
.field label { font-size: 0.8125rem; font-weight: 500; color: var(--muted-fg); letter-spacing: 0.02em; }

input[type="text"],
input[type="password"],
textarea,
select {
  width: 100%; padding: 0.5rem 0.75rem;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--font-body); font-size: 0.9375rem;
  background: white; color: var(--foreground);
  transition: border-color 0.15s; outline: none;
}
input[type="text"]:focus,
input[type="password"]:focus,
textarea:focus,
select:focus { border-color: var(--leather); box-shadow: 0 0 0 2px oklch(0.55 0.13 45 / 0.15); }
textarea { resize: vertical; }
.hint { font-size: 0.75rem; color: var(--muted-fg); }

.card { background: white; border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.5); padding: 1.25rem; }
.card-success {
  background: oklch(0.97 0.025 145);
  border: 1px solid oklch(0.85 0.06 145);
  border-radius: calc(var(--radius) * 1.5);
  padding: 1.5rem;
  text-align: center;
}

.page-item {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.875rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.page-item + .page-item { margin-top: 0.5rem; }

.section-block { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.section-block + .section-block { margin-top: 0.5rem; }

.section-header {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.75rem 1rem; cursor: pointer; user-select: none;
}
.section-header:hover { background: var(--muted); }

.section-badge {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--muted); color: var(--muted-fg);
  padding: 0.125rem 0.5rem; border-radius: 999px; white-space: nowrap;
}

.section-preview { flex: 1; color: var(--muted-fg); font-size: 0.875rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.section-arrow { color: var(--muted-fg); font-size: 0.7rem; }
.section-controls { display: flex; gap: 0.25rem; }
.section-body { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }

.image-wrap { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); display: block; flex-shrink: 0; }
.image-empty { width: 80px; height: 80px; background: var(--muted); border-radius: var(--radius); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--muted-fg); text-align: center; flex-shrink: 0; }

.list-row { display: flex; gap: 0.5rem; align-items: flex-start; padding: 0.75rem; background: var(--muted); border-radius: var(--radius); }
.list-row + .list-row { margin-top: 0.375rem; }
.list-row-fields { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
.list-row-fields input, .list-row-fields textarea, .list-row-fields select { font-size: 0.875rem; }

.checkbox-row { display: flex; align-items: center; gap: 0.5rem; }
.checkbox-row input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--leather-deep); flex-shrink: 0; cursor: pointer; }
.checkbox-row label { font-size: 0.9375rem; color: var(--foreground); font-weight: normal; cursor: pointer; }

.tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.tab-btn { padding: 0.625rem 1.25rem; font-size: 0.875rem; background: none; border: none; cursor: pointer; color: var(--muted-fg); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font-body); }
.tab-btn.active { color: var(--leather-deep); border-bottom-color: var(--leather-deep); font-weight: 500; }

.nav-row { display: flex; gap: 0.375rem; margin-bottom: 0.375rem; align-items: center; }

.back-btn { background: none; border: none; cursor: pointer; color: var(--muted-fg); font-family: var(--font-body); font-size: 0.875rem; padding: 0; display: flex; align-items: center; gap: 0.25rem; white-space: nowrap; }
.back-btn:hover { color: var(--foreground); }

.loading { display: flex; align-items: center; justify-content: center; gap: 0.625rem; padding: 4rem 1rem; color: var(--muted-fg); }
.spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

#toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--foreground); color: white;
  padding: 0.75rem 1.25rem; border-radius: var(--radius);
  font-size: 0.875rem; z-index: 100; max-width: 24rem;
  transform: translateY(5rem); opacity: 0;
  transition: transform 0.22s ease, opacity 0.22s ease;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: var(--destructive); }

.section-meta-label {
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted-fg); margin-bottom: 0.625rem;
}
.add-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.875rem; }
.add-row select { flex: 1; }
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.text-muted { color: var(--muted-fg); font-size: 0.875rem; }
.ml-auto { margin-left: auto; }
.flex { display: flex; }
.gap-2 { gap: 0.5rem; }

/* Nav step */
.nav-step-option { border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; background: white; }
.nav-step-option + .nav-step-option { margin-top: 0.5rem; }
.nav-step-row { display: flex; align-items: center; gap: 0.75rem; }
.nav-step-row input[type="text"] { flex: 1; }

/* Section picker modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.modal {
  background: var(--background);
  border-radius: calc(var(--radius) * 2);
  width: 100%; max-width: 54rem;
  max-height: 88dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 64px -12px rgba(0,0,0,0.35);
  animation: slideUp 0.18s ease;
}
@keyframes slideUp { from { transform: translateY(12px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.modal-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-body { overflow-y: auto; padding: 1.25rem; flex: 1; }

.sp-group-label {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted-fg);
  margin: 1.25rem 0 0.5rem;
}
.sp-group-label:first-child { margin-top: 0; }
.sp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 0.5rem;
}
.sp-card {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 0.625rem; cursor: pointer; background: white;
  transition: border-color 0.12s, box-shadow 0.12s;
  display: flex; flex-direction: column; gap: 0.5rem;
  text-align: left;
}
.sp-card:hover { border-color: var(--leather); box-shadow: 0 0 0 2px oklch(0.55 0.13 45 / 0.15); }
.sp-card-name { font-size: 0.75rem; font-weight: 600; color: var(--foreground); }
.sp-card-desc { font-size: 0.68rem; color: var(--muted-fg); line-height: 1.45; }

/* Wireframe shapes */
.wf { width: 100%; height: 72px; overflow: hidden; border-radius: 4px; background: var(--muted); flex-shrink: 0; }
.wf-row { display: flex; height: 100%; }
.wf-col { display: flex; flex-direction: column; justify-content: center; padding: 6px 7px; }
.wf-img { background: oklch(0.82 0.015 70); flex-shrink: 0; }
.wf-line { height: 5px; border-radius: 999px; background: oklch(0.68 0.025 50); margin-bottom: 3px; }
.wf-sm  { width: 32%; height: 3px; background: oklch(0.55 0.13 45 / 0.55); }
.wf-md  { width: 70%; }
.wf-lg  { width: 85%; height: 8px; background: oklch(0.42 0.04 42); }
.wf-xs  { width: 48%; height: 3px; }
.wf-btn { height: 11px; width: 42%; border-radius: 3px; background: oklch(0.42 0.1 40); margin-top: 4px; }
.wf-btnsm { height: 9px; width: 28%; border-radius: 3px; background: oklch(0.42 0.1 40); }
.wf-card { background: white; border: 1px solid oklch(0.88 0.022 70); border-radius: 3px; }
.wf-inp  { height: 10px; background: white; border: 1px solid oklch(0.88 0.022 70); border-radius: 2px; }
.wf-dark { background: oklch(0.3 0.045 40); }
.wf-muted-bg { background: oklch(0.95 0.014 80); }

/* Preview accordion */
#preview-pane-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.preview-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.625rem 1rem;
  background: var(--muted);
  cursor: pointer;
  user-select: none;
}
.preview-bar:hover { background: var(--border); }
.preview-bar-label { font-size: 0.8125rem; font-weight: 500; color: var(--foreground); flex: 1; }
.preview-bar-arrow { font-size: 0.7rem; color: var(--muted-fg); transition: transform 0.15s; }
.preview-bar-arrow.open { transform: rotate(180deg); }
#preview-iframe { width: 100%; height: 62vh; border: none; display: block; border-top: 1px solid var(--border); }
#preview-pane-wrap.mobile { background: oklch(0.92 0.01 75); }
#preview-pane-wrap.mobile #preview-iframe { width: 390px; margin: 0 auto; border-radius: 12px 12px 0 0; border: 1px solid var(--border); border-bottom: none; }
.preview-viewport-btn { font-size: 0.75rem; padding: 0.25rem 0.625rem; }
.preview-viewport-btn.active { background: var(--muted); color: var(--foreground); border-color: var(--border); }

@media (max-width: 600px) {
  .app-header { padding: 0.625rem 1rem; }
  .main { padding: 1.25rem 1rem 5rem; }
  .sp-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}

/* Link badges & button-group fields */
.link-badge {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  white-space: nowrap;
  display: inline-block;
}
.link-badge-intern { background: oklch(0.91 0.05 145); color: oklch(0.32 0.09 145); }
.link-badge-extern { background: oklch(0.91 0.06 230); color: oklch(0.35 0.12 230); }
.link-badge-empty  { background: var(--muted); color: var(--muted-fg); }
.button-group-fields { display: flex; flex-direction: column; gap: 0.5rem; }
</style>
</head>

/* ── GitHub API ───────────────────────────────────────────────── */

async function apiReq(method, path, body) {
  const res = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}${path}`, {
    method,
    headers: {
      Authorization: `Bearer ${cfg.pat}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(body ? { 'Content-Type': 'application/json' } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function getFile(filePath) {
  return apiReq('GET', `/contents/${filePath}?ref=${cfg.branch}`);
}

async function putFile(filePath, content, message, sha) {
  const body = { message, content: b64Encode(content), branch: cfg.branch };
  if (sha) body.sha = sha;
  return apiReq('PUT', `/contents/${filePath}`, body);
}

async function deleteFile(filePath, sha, message) {
  return apiReq('DELETE', `/contents/${filePath}`, { message, sha, branch: cfg.branch });
}

async function getPageFiles() {
  const tree = await apiReq('GET', `/git/trees/${cfg.branch}?recursive=1`);
  return tree.tree
    .filter(f => f.path.startsWith('src/content/pages/') && f.path.endsWith('.json'))
    .map(f => f.path);
}

/* ── Encoding ─────────────────────────────────────────────────── */

function b64Encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => (bin += String.fromCharCode(b)));
  return btoa(bin);
}

function b64Decode(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

/* ── Image helpers ────────────────────────────────────────────── */

function rawUrl(storedPath) {
  if (!storedPath) return '';
  const repoPath = 'public' + (storedPath.startsWith('/') ? storedPath : '/' + storedPath);
  return `https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${repoPath}`;
}

/* ── Image upload ─────────────────────────────────────────────── */

function bufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  const CHUNK = 8192;
  let bin = '';
  for (let i = 0; i < bytes.length; i += CHUNK) {
    bin += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
  }
  return btoa(bin);
}

async function uploadImage(file) {
  const buffer = await file.arrayBuffer();

  const hashBuf = await crypto.subtle.digest('SHA-1', buffer);
  const hash = Array.from(new Uint8Array(hashBuf)).slice(0, 4)
    .map(b => b.toString(16).padStart(2, '0')).join('');

  const ext  = file.name.split('.').pop().toLowerCase();
  const base = file.name.replace(/\.[^.]+$/, '').toLowerCase()
    .replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  const name    = `${base}-${hash}.${ext}`;
  const apiPath = `public/images/${name}`;

  const base64 = bufferToBase64(buffer);

  let existingSha;
  try {
    const existing = await getFile(apiPath);
    existingSha = existing.sha;
  } catch { /* new file */ }

  const body = { message: `Laddar upp ${name}`, content: base64, branch: cfg.branch };
  if (existingSha) body.sha = existingSha;
  await apiReq('PUT', `/contents/${apiPath}`, body);

  return `/images/${name}`;
}

/* ── DOM helper ───────────────────────────────────────────────── */

function h(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'className') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'htmlFor') e.htmlFor = v;
    else if (k === 'checked') e.checked = v;
    else if (k === 'selected') e.selected = v;
    else if (k === 'disabled') e.disabled = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat(Infinity)) {
    if (c == null || c === false) continue;
    e.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

/* ── Slug helper ──────────────────────────────────────────────── */

function toSlug(title) {
  return title.toLowerCase()
    .replace(/[åä]/g, 'a').replace(/ö/g, 'o')
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}


/* ── Delete page ──────────────────────────────────────────────── */

async function deletePage(p) {
  if (!confirm(`Ta bort sidan "${p.title}" (/${p.slug})?\n\nDetta går inte att ångra.`)) return;
  loading('Tar bort sida…');
  try {
    await deleteFile(p.filePath, p.sha, `Tar bort sida: ${p.slug}`);

    // Best-effort: remove from navigation
    try {
      const nf  = await getFile('src/content/settings/navigation.json');
      const nav = JSON.parse(b64Decode(nf.content));
      const href = '/' + p.slug;
      let changed = false;
      ['header', 'footer'].forEach(key => {
        if (!nav[key]) return;
        const before = nav[key].length;
        nav[key] = nav[key].filter(item => item.href !== href);
        if (nav[key].length !== before) changed = true;
      });
      if (changed) {
        await putFile('src/content/settings/navigation.json', JSON.stringify(nav, null, 2), `Tar bort ${p.slug} från navigation`, nf.sha);
      }
    } catch { /* navigation update is best-effort */ }

    toast(`"${p.title}" togs bort.`);
    loadPageList();
  } catch (err) {
    toast('Fel vid borttagning: ' + err.message, true);
    loadPageList();
  }
}

  sections.forEach((sec, i) => container.append(makeSectionBlock(sec, i, sections.length, container)));

function makeSectionBlock(sec, i, total, listEl) {
  const schema  = SECTION_SCHEMA[sec.type] || [];
  const label   = SECTION_LABELS[sec.type] || sec.type;
  const isOpen  = openSections.has(i);
  const preview = schema.find(f => f.key === 'title' || f.key === 'quote');
  const previewTxt = preview ? (sec[preview.key] || '') : '';

  const block = h('div', { className: 'section-block' });

  const upBtn   = h('button', { className: 'btn btn-ghost btn-sm', title: 'Flytta upp', disabled: i === 0, onClick: () => { swap(i, i - 1); rebuildSectionList(listEl); } }, '↑');
  const downBtn = h('button', { className: 'btn btn-ghost btn-sm', title: 'Flytta ner', disabled: i === total - 1, onClick: () => { swap(i, i + 1); rebuildSectionList(listEl); } }, '↓');
  const delBtn  = h('button', { className: 'btn btn-ghost btn-sm', style: 'color:var(--destructive)', onClick: e => {
    e.stopPropagation();
    if (!confirm(`Ta bort "${label}"?`)) return;
    pageData.sections.splice(i, 1);
    openSections.delete(i);
    // shift down all open indices above i
    const shifted = new Set();
    openSections.forEach(n => shifted.add(n > i ? n - 1 : n));
    openSections = shifted;
    markDirty();
    rebuildSectionList(listEl);
  }}, 'Radera');

  const headerEl = h('div', { className: 'section-header', onClick: () => {
    if (openSections.has(i)) openSections.delete(i); else openSections.add(i);
    rebuildSectionList(listEl);
  }},
    h('span', { className: 'section-badge' }, label),
    h('span', { className: 'section-preview' }, previewTxt),
    h('span', { className: 'section-arrow' }, isOpen ? '▲' : '▼'),
    h('div', { className: 'section-controls', onClick: e => e.stopPropagation() }, upBtn, downBtn, delBtn),
  );

  block.append(headerEl);

  if (isOpen) {
    const body = h('div', { className: 'section-body' });
    schema.forEach(field => {
      if (field.type === 'button-group') {
        body.append(makeButtonGroup(field, sec, markDirty));
      } else {
        body.append(makeField(field, sec[field.key], val => { sec[field.key] = val; markDirty(); }));
      }
    });
    block.append(body);
  }

  return block;
}

function swap(a, b) {
  [pageData.sections[a], pageData.sections[b]] = [pageData.sections[b], pageData.sections[a]];
  // carry open state with the moved sections
  const aOpen = openSections.has(a);
  const bOpen = openSections.has(b);
  openSections.delete(a); openSections.delete(b);
  if (aOpen) openSections.add(b);
  if (bOpen) openSections.add(a);
  markDirty();
}

/* ── Section picker modal ─────────────────────────────────────── */

function openSectionPicker(onPick) {
  const overlay = h('div', { className: 'modal-overlay', onClick: e => { if (e.target === overlay) overlay.remove(); } });

  const body = h('div', { className: 'modal-body' });

  SECTION_GROUPS.forEach(group => {
    body.append(h('p', { className: 'sp-group-label' }, group.label));
    const grid = h('div', { className: 'sp-grid' });

    group.types.forEach(type => {
      const card = h('button', { className: 'sp-card', onClick: () => { onPick(type); overlay.remove(); } },
        makeWireframe(type),
        h('div', { className: 'sp-card-name' }, SECTION_LABELS[type] || type),
        h('div', { className: 'sp-card-desc' }, SECTION_DESCRIPTIONS[type] || ''),
      );
      grid.append(card);
    });

    body.append(grid);
  });

  const modal = h('div', { className: 'modal', role: 'dialog', 'aria-modal': 'true', 'aria-label': 'Välj sektionstyp' },
    h('div', { className: 'modal-header' },
      h('span', { style: 'font-weight:500;font-size:0.9375rem' }, 'Välj sektionstyp'),
      h('button', { className: 'btn btn-ghost btn-sm', onClick: () => overlay.remove() }, 'Stäng'),
    ),
    body,
  );

  overlay.append(modal);
  document.body.append(overlay);

  // Move focus into modal and trap it; restore on close
  const firstFocusable = modal.querySelector('button');
  firstFocusable?.focus();
  overlay.addEventListener('keydown', e => {
    if (e.key === 'Escape') overlay.remove();
  });
}

function makeAddSectionBar(listEl) {
  const btn = h('button', { className: 'btn btn-secondary', style: 'margin-top:1rem;width:100%', onClick: () => {
    openSectionPicker(type => {
      pageData.sections = pageData.sections || [];
      pageData.sections.push({ type });
      openSections.add(pageData.sections.length - 1);
      markDirty();
      rebuildSectionList(listEl);
      listEl.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }}, '+ Lägg till sektion');
  return btn;
}

/* ── Link helpers ─────────────────────────────────────────────── */

function detectLinkType(href) {
  if (!href) return 'empty';
  if (/^https?:\/\//.test(href)) return 'extern';
  return 'intern';
}

function updateLinkBadge(badge, hintEl, href) {
  const t = detectLinkType(href);
  if (t === 'extern') {
    badge.textContent = '↗ extern länk';
    badge.className = 'link-badge link-badge-extern';
    if (hintEl) hintEl.textContent = 'Extern webbplats — öppnas automatiskt i nytt fönster';
  } else if (t === 'intern') {
    badge.textContent = '↩ intern sida';
    badge.className = 'link-badge link-badge-intern';
    if (hintEl) hintEl.textContent = 'Intern länk — ange sökvägen, t.ex. /kontakt eller /om-marie';
  } else {
    badge.textContent = '';
    badge.className = 'link-badge link-badge-empty';
    if (hintEl) hintEl.textContent = 'Intern länk: skriv /sidnamn (t.ex. /kontakt). Extern länk: skriv hela adressen med https://';
  }
}

function makeButtonGroup(field, sec, onDirty) {
  const lk = field.labelKey;
  const hk = field.hrefKey;
  const isLink = field.variant === 'link';

  const wrap = h('div', { className: 'field' });
  wrap.append(h('label', {}, field.label));

  // Datalist with known pages for URL autocomplete
  const dlId = 'pdl-' + Math.random().toString(36).slice(2);
  const dl = document.createElement('datalist');
  dl.id = dlId;
  knownPages.forEach(p => {
    const o = document.createElement('option');
    o.value = '/' + (p.slug === 'hem' ? '' : p.slug);
    o.textContent = p.title;
    dl.append(o);
  });

  const badge  = h('span', { className: 'link-badge link-badge-empty' });
  const hintEl = h('span', { className: 'hint' });
  updateLinkBadge(badge, hintEl, sec[hk] || '');

  // Validation error elements
  const labelErr = h('span', { className: 'hint', style: 'color:var(--destructive);display:none' }, '⚠ Text saknas — knappen visas inte utan text');
  const hrefErr  = h('span', { className: 'hint', style: 'color:var(--destructive);display:none' }, '⚠ Länk saknas — knappen visas inte utan destination');

  function validate() {
    const hasLabel = !!(sec[lk] || '').trim();
    const hasHref  = !!(sec[hk] || '').trim();
    const mismatch = hasLabel !== hasHref;
    labelInp.style.borderColor = (mismatch && !hasLabel) ? 'var(--destructive)' : '';
    hrefInp.style.borderColor  = (mismatch && !hasHref)  ? 'var(--destructive)' : '';
    labelErr.style.display = (mismatch && !hasLabel) ? '' : 'none';
    hrefErr.style.display  = (mismatch && !hasHref)  ? '' : 'none';
  }

  const hrefInp = h('input', {
    type: 'text',
    placeholder: '/kontakt  eller  https://...',
    value: sec[hk] || '',
    list: dlId,
    onInput: e => {
      sec[hk] = e.target.value;
      updateLinkBadge(badge, hintEl, e.target.value);
      validate();
      onDirty();
    },
  });

  const labelInp = h('input', {
    type: 'text',
    placeholder: isLink ? 'Länktext, t.ex. "Läs mer om mig"' : 'Knapptext',
    value: sec[lk] || '',
    onInput: e => {
      sec[lk] = e.target.value;
      validate();
      onDirty();
    },
  });

  // Run once on load to catch already-broken data
  validate();

  wrap.append(
    h('div', { className: 'button-group-fields' },
      h('div', { className: 'field', style: 'gap:0.25rem' },
        h('label', { style: 'font-size:0.75rem;font-weight:500;color:var(--muted-fg)' }, 'Text'),
        labelInp,
        labelErr,
      ),
      h('div', { className: 'field', style: 'gap:0.25rem' },
        h('div', { style: 'display:flex;align-items:center;gap:0.5rem' },
          h('label', { style: 'font-size:0.75rem;font-weight:500;color:var(--muted-fg)' }, 'Länk'),
          badge,
        ),
        hrefInp,
        hrefErr,
        hintEl,
        dl,
      ),
    ),
  );

  return wrap;
}

/* ── Field editors ────────────────────────────────────────────── */

function makeField(field, value, onChange) {
  const wrap = h('div', { className: 'field' });

  if (field.type === 'checkbox') {
    const id = 'cb-' + Math.random().toString(36).slice(2);
    const cb = h('input', { type: 'checkbox', id, checked: value === undefined ? true : !!value });
    cb.addEventListener('change', e => onChange(e.target.checked));
    wrap.append(h('div', { className: 'checkbox-row' }, cb, h('label', { htmlFor: id }, field.label)));
    if (field.hint) wrap.append(h('span', { className: 'hint' }, field.hint));
    return wrap;
  }

  wrap.append(h('label', {}, field.label + (field.required ? ' *' : '')));

  switch (field.type) {
    case 'text': {
      wrap.append(h('input', { type: 'text', value: value || '', onInput: e => onChange(e.target.value) }));
      if (field.hint) wrap.append(h('span', { className: 'hint' }, field.hint));
      break;
    }
    case 'textarea': {
      const ta = document.createElement('textarea');
      ta.rows = field.rows || 5;
      ta.value = value || '';
      ta.addEventListener('input', e => onChange(e.target.value));
      const taHint = field.hint || 'Stöder markdown: **fetstil**, *kursiv*, - lista';
      wrap.append(ta, h('span', { className: 'hint' }, taHint));
      break;
    }
    case 'select': {
      const sel = h('select', { onChange: e => onChange(e.target.value) },
        h('option', { value: '' }, '—'),
        ...(field.options || []).map(o => {
          const val = typeof o === 'object' ? o.value : o;
          const lbl = typeof o === 'object' ? o.label : o;
          return h('option', { value: val, selected: val === value }, lbl);
        }),
      );
      if (value) sel.value = value;
      wrap.append(sel);
      if (field.hint) wrap.append(h('span', { className: 'hint' }, field.hint));
      break;
    }
    case 'image': {
      wrap.append(makeImageField(value, onChange));
      break;
    }
    case 'image-list': {
      wrap.append(makeImageList(value || [], onChange));
      break;
    }
    case 'card-list': {
      wrap.append(makeCardList(value || [], onChange));
      break;
    }
    case 'service-list': {
      wrap.append(makeServiceList(value || [], onChange));
      break;
    }
    case 'testimonial-list': {
      wrap.append(makeTestimonialList(value || [], onChange));
      break;
    }
    case 'step-list': {
      wrap.append(makeStepList(value || [], onChange));
      break;
    }
    case 'credential-list': {
      wrap.append(makeCredentialList(value || [], onChange));
      break;
    }
  }

  return wrap;
}

function makeImageField(value, onChange) {
  const wrap = h('div', { className: 'image-wrap' });

  let thumb = value
    ? h('img', { src: rawUrl(value), className: 'image-thumb', alt: '' })
    : h('div', { className: 'image-empty' }, 'Ingen bild');

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.style.display = 'none';

  const uploadBtn = h('button', { className: 'btn btn-ghost btn-sm', onClick: () => fileInput.click() }, value ? 'Byt bild' : 'Välj bild');

  fileInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const url = await uploadImage(file);
      onChange(url);
      const newThumb = h('img', { src: rawUrl(url), className: 'image-thumb', alt: '' });
      wrap.replaceChild(newThumb, thumb);
      thumb = newThumb;
      uploadBtn.textContent = 'Byt bild';
      toast('Bilden laddades upp!');
    } catch (err) {
      toast('Uppladdning misslyckades: ' + err.message, true);
      uploadBtn.textContent = value ? 'Byt bild' : 'Välj bild';
    } finally {
      uploadBtn.disabled = false;
    }
  });

  wrap.append(thumb, uploadBtn, fileInput);
  return wrap;
}

function makeImageList(items, onChange) {
  const container = h('div', {});
  const list = [...items];

  const rerender = () => {
    container.innerHTML = '';
    list.forEach((item, idx) => {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';

      const thumb = item.url
        ? h('img', { src: rawUrl(item.url), className: 'image-thumb', alt: '' })
        : h('div', { className: 'image-empty' }, 'Bild');

      const pickBtn = h('button', { className: 'btn btn-ghost btn-sm', onClick: () => fileInput.click() }, item.url ? 'Byt' : 'Välj');

      fileInput.addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        pickBtn.disabled = true;
        try {
          list[idx].url = await uploadImage(file);
          onChange([...list]);
          rerender();
          toast('Bilden laddades upp!');
        } catch (err) {
          toast('Fel: ' + err.message, true);
        } finally {
          pickBtn.disabled = false;
        }
      });

      const altWarn = h('span', {
        style: 'font-size:0.7rem;color:var(--destructive);display:' + (item.alt ? 'none' : 'block'),
        title: 'Alt-text saknas — lägg till en bildbeskrivning för tillgänglighet och SEO',
      }, '⚠ Alt-text saknas');

      const altInp = h('input', { type: 'text', placeholder: 'Bildbeskrivning (alt) — obligatorisk för tillgänglighet', value: item.alt || '',
        style: item.alt ? '' : 'border-color:var(--destructive)',
        onInput: e => {
          list[idx].alt = e.target.value;
          altWarn.style.display = e.target.value ? 'none' : 'block';
          e.target.style.borderColor = e.target.value ? '' : 'var(--destructive)';
          onChange([...list]);
        },
      });
      const delBtn = h('button', { className: 'btn btn-ghost btn-sm', style: 'color:var(--destructive)', onClick: () => { list.splice(idx, 1); onChange([...list]); rerender(); } }, '×');

      container.append(h('div', { className: 'list-row' },
        h('div', { style: 'display:flex;flex-direction:column;align-items:center;gap:0.375rem' }, thumb, pickBtn, fileInput),
        h('div', { className: 'list-row-fields' }, altInp, altWarn),
        delBtn,
      ));
    });

    container.append(h('button', { className: 'btn btn-ghost btn-sm', style: 'margin-top:0.375rem', onClick: () => { list.push({ url: '', alt: '' }); onChange([...list]); rerender(); } }, '+ Lägg till bild'));
  };

  rerender();
  return container;
}

/* ── Publish ──────────────────────────────────────────────────── */

async function publishPage() {
  const btn = document.getElementById('publish-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const json = JSON.stringify(pageData, null, 2);
    const filePath = `src/content/pages/${pageSlug}.json`;
    const res = await putFile(filePath, json, `Uppdaterar ${pageSlug}`, pageSha);
    pageSha = res.content.sha;
    clearDirty();
    toast('Publicerat! Sidan är live om ~2 minuter.');
  } catch (err) {
    toast('Fel vid publicering: ' + err.message, true);
    markDirty();
  } finally {
    btn.disabled = false;
  }
}

/* ── View: New Page ───────────────────────────────────────────── */

function showNewPage() {
  app().innerHTML = '';

  const header = makeHeader(
    h('button', { className: 'back-btn', onClick: loadPageList }, '← Sidor'),
    'Ny sida',
    null,
  );

  const slugInp  = h('input', { type: 'text', placeholder: 'om-marie', pattern: '[a-z0-9-]+', required: true });
  const titleInp = h('input', { type: 'text', required: true });
  const descInp  = h('input', { type: 'text' });

  let slugEdited = false;
  slugInp.addEventListener('input', () => { slugEdited = true; });
  titleInp.addEventListener('input', () => {
    if (!slugEdited) slugInp.value = toSlug(titleInp.value);
  });

  const form = h('div', { className: 'card', style: 'display:flex;flex-direction:column;gap:1rem' },
    h('div', { className: 'field' }, h('label', {}, 'Sidtitel *'), titleInp),
    h('div', { className: 'field' }, h('label', {}, 'Slug (URL-del) *'), slugInp, h('span', { className: 'hint' }, 'Genereras automatiskt — ändra vid behov. Gemener, siffror och bindestreck.')),
    h('div', { className: 'field' }, h('label', {}, 'Meta-beskrivning (SEO)'), descInp),
  );

  const createBtn = h('button', { className: 'btn btn-primary' }, 'Skapa sida');
  form.append(createBtn);

  createBtn.addEventListener('click', async () => {
    const slug  = slugInp.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
    const title = titleInp.value.trim();
    if (!slug || !title) { toast('Slug och meta-titel krävs.', true); return; }

    createBtn.disabled = true;
    createBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const data = { meta: { slug, title, description: descInp.value.trim() }, sections: [] };
      const filePath = `src/content/pages/${slug}.json`;
      await putFile(filePath, JSON.stringify(data, null, 2), `Skapar sida: ${slug}`, null);
      knownPages.push({ slug, title });
      showNavStep(slug, title, filePath);
    } catch (err) {
      toast('Fel: ' + err.message, true);
      createBtn.disabled = false;
      createBtn.textContent = 'Skapa sida';
    }
  });

  app().append(header, h('div', { className: 'main', role: 'main' }, form));
}

/* ── View: Nav step (after page create) ───────────────────────── */

function showNavStep(slug, title, filePath) {
  app().innerHTML = '';

  const header = makeHeader(null, 'Sidan skapades', null);

  // State for this step
  const addToHeader = { checked: true, label: title };
  const addToFooter = { checked: false, label: title };

  const makeNavOption = (label, state) => {
    const id = 'nav-' + Math.random().toString(36).slice(2);
    const cb = h('input', { type: 'checkbox', id, checked: state.checked });
    cb.addEventListener('change', e => { state.checked = e.target.checked; labelInp.disabled = !e.target.checked; });
    const labelInp = h('input', { type: 'text', value: state.label, placeholder: 'Menytext', style: 'flex:1', onInput: e => { state.label = e.target.value; } });

    return h('div', { className: 'nav-step-option' },
      h('div', { className: 'nav-step-row' },
        h('input', { type: 'checkbox', id, checked: state.checked, onChange: e => { state.checked = e.target.checked; labelInp.disabled = !e.target.checked; } }),
        h('label', { htmlFor: id, style: 'font-weight:500;cursor:pointer' }, label),
      ),
      h('div', { className: 'nav-step-row', style: 'padding-left:1.5rem' },
        h('span', { style: 'font-size:0.8125rem;color:var(--muted-fg);white-space:nowrap' }, 'Menytext'),
        labelInp,
      ),
    );
  };

  const skipBtn = h('button', { className: 'btn btn-ghost', onClick: () => loadEditor(slug, filePath) }, 'Hoppa över');

  const addBtn = h('button', { className: 'btn btn-primary', onClick: async () => {
    if (!addToHeader.checked && !addToFooter.checked) {
      loadEditor(slug, filePath);
      return;
    }
    addBtn.disabled = true;
    addBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const nf = await getFile('src/content/settings/navigation.json');
      const nav = JSON.parse(b64Decode(nf.content));
      if (addToHeader.checked) (nav.header = nav.header || []).push({ label: addToHeader.label, href: '/' + slug });
      if (addToFooter.checked) (nav.footer = nav.footer || []).push({ label: addToFooter.label, href: '/' + slug });
      await putFile('src/content/settings/navigation.json', JSON.stringify(nav, null, 2), `Lägger till ${slug} i navigation`, nf.sha);
      toast('Sidan och menyn uppdaterade!');
    } catch (err) {
      toast('Menyn kunde inte uppdateras: ' + err.message, true);
    }
    loadEditor(slug, filePath);
  }}, 'Lägg till & öppna sida');

  const card = h('div', { className: 'card', style: 'display:flex;flex-direction:column;gap:1.25rem' },
    h('div', { className: 'card-success' },
      h('div', { style: 'font-size:1.75rem;margin-bottom:0.375rem' }, '✓'),
      h('div', { style: 'font-weight:500;font-size:1rem' }, `"${title}" skapades`),
    ),
    h('p', { style: 'font-size:0.9375rem;color:var(--muted-fg)' }, 'Vill du lägga till sidan i menyn?'),
    makeNavOption('Topmeny', addToHeader),
    makeNavOption('Fotmeny', addToFooter),
    h('div', { style: 'display:flex;gap:0.75rem;justify-content:flex-end;padding-top:0.25rem' }, skipBtn, addBtn),
  );

  app().append(header, h('div', { className: 'main', role: 'main' }, card));
}

/* ── View: Settings ───────────────────────────────────────────── */

async function loadSettings() {
  // Konfiguration-fliken behöver inga GitHub-filer — visa den direkt utan att ladda
  if (settingsTab === 'konfiguration' || !cfg.pat) {
    showSettings();
    return;
  }
  loading('Laddar inställningar…');
  try {
    const [cf, nf, sf, nlf] = await Promise.all([
      getFile('src/content/settings/contact.json'),
      getFile('src/content/settings/navigation.json'),
      getFile('src/content/settings/seo.json'),
      getFile('src/content/settings/newsletter.json'),
    ]);
    settingsData = {
      contact:    { data: JSON.parse(b64Decode(cf.content)),  sha: cf.sha },
      navigation: { data: JSON.parse(b64Decode(nf.content)),  sha: nf.sha },
      seo:        { data: JSON.parse(b64Decode(sf.content)),  sha: sf.sha },
      newsletter: { data: JSON.parse(b64Decode(nlf.content)), sha: nlf.sha },
    };
    showSettings();
  } catch (err) {
    toast('Fel: ' + err.message, true);
    loadPageList();
  }
}

function showSettings() {
  app().innerHTML = '';

  const header = makeHeader(
    h('button', { className: 'back-btn', onClick: loadPageList }, '← Sidor'),
    'Inställningar',
    null,
  );

  const tabBar  = h('div', { className: 'tab-bar' });
  const content = h('div', {});

  const TABS = [
    { id: 'contact',       label: 'Kontakt' },
    { id: 'navigation',    label: 'Navigation' },
    { id: 'seo',           label: 'SEO' },
    { id: 'newsletter',    label: 'Nyhetsbrev' },
    { id: 'konfiguration', label: 'Konfiguration' },
  ];

  const switchTab = async id => {
    // Ladda settings-filer om vi byter till en flik som behöver dem och de saknas
    if (id !== 'konfiguration' && !settingsData.contact) {
      loading('Laddar inställningar…');
      try {
        const [cf, nf, sf, nlf] = await Promise.all([
          getFile('src/content/settings/contact.json'),
          getFile('src/content/settings/navigation.json'),
          getFile('src/content/settings/seo.json'),
          getFile('src/content/settings/newsletter.json'),
        ]);
        settingsData = {
          contact:    { data: JSON.parse(b64Decode(cf.content)),  sha: cf.sha },
          navigation: { data: JSON.parse(b64Decode(nf.content)),  sha: nf.sha },
          seo:        { data: JSON.parse(b64Decode(sf.content)),  sha: sf.sha },
          newsletter: { data: JSON.parse(b64Decode(nlf.content)), sha: nlf.sha },
        };
        showSettings();
        return;
      } catch (err) {
        toast('Fel: ' + err.message, true);
        return;
      }
    }
    settingsTab = id;
    tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    content.innerHTML = '';
    if (id === 'contact')       content.append(makeContactTab());
    if (id === 'navigation')    content.append(makeNavTab());
    if (id === 'seo')           content.append(makeSeoTab());
    if (id === 'newsletter')    content.append(makeNewsletterTab());
    if (id === 'konfiguration') content.append(makeConfigTab());
  };

  TABS.forEach(t => {
    const btn = h('button', { className: 'tab-btn' + (t.id === settingsTab ? ' active' : ''), onClick: () => switchTab(t.id) }, t.label);
    btn.dataset.tab = t.id;
    tabBar.append(btn);
  });

  switchTab(settingsTab);

  app().append(header, h('div', { className: 'main', role: 'main' }, tabBar, content));
}

function md(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/((?:^[-*] .+(?:\n|$))+)/gm, m =>
    '<ul>' + m.replace(/^[-*] (.+)$/gm, '<li>$1</li>') + '</ul>');
  const blocks = t.split(/\n\n+/);
  return blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<[huo]/.test(b)) return b;
    return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function imgEl(src, alt, style) {
  if (!src) return '';
  return `<img src="${esc(rawUrl(src))}" alt="${esc(alt||'')}"${style?` style="${style}"`:''}>`;
}
function btnHtml(label, href, cls) { if (!label) return ''; return `<a href="${esc(href||'#')}" class="${cls||'btn-primary'}">${esc(label)}</a>`; }

    /* About band */
    .about-band{padding:5rem 0;position:relative;overflow:hidden}
    .about-band-grid{display:grid;grid-template-columns:2fr 3fr;gap:4rem;align-items:center}
    .about-band-img{border-radius:.75rem;overflow:hidden;aspect-ratio:3/4}
    .about-band-img img{width:100%;height:100%;object-fit:cover}
    .about-band-title{font-size:clamp(1.75rem,3vw,2.5rem);margin-bottom:1.25rem}
    .about-band-link{display:inline-flex;align-items:center;gap:.5rem;color:var(--leather);font-weight:500;text-decoration:none;margin-top:1.5rem}

    /* Services grid */
    .services-grid{padding:5rem 0}
    .services-grid-header{margin-bottom:3rem}
    .services-grid-title{font-size:clamp(1.75rem,3vw,2.5rem);margin-bottom:.75rem}
    .services-grid-sub{color:var(--muted-fg);max-width:36rem}
    .services-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .service-card{background:white;border:1px solid var(--border);border-radius:1rem;overflow:hidden;display:flex;flex-direction:column}
    .service-card-img{aspect-ratio:4/3;overflow:hidden}
    .service-card-img img{width:100%;height:100%;object-fit:cover}
    .service-card-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
    .service-card-eyebrow{font-size:.6875rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--sage-deep);margin-bottom:.5rem}
    .service-card-title{font-family:var(--font-display);font-size:1.375rem;font-weight:500;margin-bottom:.75rem}
    .service-card-text{font-size:.9375rem;color:var(--muted-fg);line-height:1.65;flex:1}
    .service-card-link{font-size:.875rem;font-weight:500;color:var(--leather);margin-top:1.25rem;text-decoration:none}
    .service-card.large{grid-column:span 2}
    .service-card.wide{grid-column:1/-1;flex-direction:row}
    .service-card.wide .service-card-img{width:40%;flex-shrink:0;aspect-ratio:auto}

    /* Gallery */
    .gallery{padding:4rem 0}
    .gallery-header{margin-bottom:2rem}
    .gallery-title{font-size:2rem}
    .gallery-grid{display:grid;gap:.5rem}
    .gallery-grid.cols-2{grid-template-columns:repeat(2,1fr)}
    .gallery-grid.cols-3{grid-template-columns:repeat(3,1fr)}
    .gallery-grid.cols-4{grid-template-columns:repeat(4,1fr)}
    .gallery-item{aspect-ratio:1;overflow:hidden;border-radius:.25rem}
    .gallery-item img{width:100%;height:100%;object-fit:cover}

    /* CTA */
    .cta-section{padding:5rem 0}
    .cta-card{border-radius:1.5rem;padding:3.5rem}
    .cta-card.dark{background:var(--leather-deep);color:white}
    .cta-card.light{background:var(--muted);color:var(--foreground)}
    .cta-card.sage{background:var(--sage-deep);color:white}
    .cta-card.center{text-align:center}
    .cta-card.center .cta-btns{justify-content:center}
    .cta-title{font-size:clamp(1.75rem,3vw,2.5rem);margin-bottom:1rem}
    .cta-body{font-size:1.0625rem;opacity:.85;margin-bottom:2rem;line-height:1.7}
    .cta-btns{display:flex;gap:.75rem;flex-wrap:wrap}
    .cta-card.dark .btn-primary,.cta-card.sage .btn-primary{background:white;color:var(--leather-deep)}
    .cta-card.dark .btn-outline,.cta-card.sage .btn-outline{border-color:rgba(255,255,255,.5);color:white}

    /* Quote */
    .quote-default{padding:4rem 0}
    .quote-default blockquote{max-width:48rem;padding-left:2rem;border-left:3px solid var(--sage)}
    .quote-default p{font-family:var(--font-display);font-size:1.75rem;font-style:italic;line-height:1.45}
    .quote-default footer{margin-top:1rem;font-size:.875rem;color:var(--muted-fg)}
    .quote-hero{padding:6rem 1.25rem;background:var(--leather-deep);text-align:center}
    .quote-hero blockquote{max-width:52rem;margin:0 auto}
    .quote-hero p{font-family:var(--font-display);font-size:clamp(1.75rem,4vw,2.75rem);font-style:italic;color:white;line-height:1.4}
    .quote-hero footer{margin-top:1.5rem;font-size:.875rem;color:rgba(255,255,255,.6)}

    /* Info card */
    .info-card-section{padding:4rem 0}
    .info-card{max-width:48rem;margin:0 auto;border-radius:1rem;padding:2rem 2.5rem}
    .info-card.soft{background:var(--muted);border:1px solid var(--border)}
    .info-card.warm{background:oklch(0.97 0.018 65);border:1px solid oklch(0.88 0.035 60)}
    .info-card.sage{background:oklch(0.97 0.018 135);border:1px solid oklch(0.88 0.04 135)}
    .info-card-title{font-size:1.5rem;margin-bottom:1rem}

    /* Method cards */
    .method-cards{padding:5rem 0}
    .method-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .method-card{background:white;border:1px solid var(--border);border-radius:1rem;padding:2rem}
    .method-card-icon{width:3rem;height:3rem;border-radius:.75rem;background:oklch(0.97 0.025 140);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;color:var(--sage-deep)}
    .method-card-title{font-size:1.25rem;font-family:var(--font-display);font-weight:500;margin-bottom:.75rem}
    .method-card-body{font-size:.9375rem;color:var(--muted-fg);line-height:1.65}

    /* Contact card */
    .contact-card-section{padding:4rem 0}
    .contact-card{max-width:32rem;margin:0 auto;background:white;border:1px solid var(--border);border-radius:1rem;padding:2rem}
    .contact-card-title{font-size:1.375rem;margin-bottom:1.5rem}
    .contact-row{display:flex;align-items:flex-start;gap:.875rem;padding:.875rem 0;border-top:1px solid var(--border)}
    .contact-icon{width:2.25rem;height:2.25rem;border-radius:50%;background:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--leather);font-size:.875rem}
    .contact-label{font-size:.75rem;color:var(--muted-fg);margin-bottom:.125rem}
    .contact-value{font-size:.9375rem}
    .contact-conf{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);font-size:.8125rem;color:var(--muted-fg);line-height:1.6}

    /* Booking grid */
    .booking-grid-section{padding:5rem 0}
    .booking-grid-inner{display:grid;grid-template-columns:2fr 1fr;gap:4rem;align-items:start}

    /* Testimonials */
    .testimonials{padding:5rem 0;background:var(--muted)}
    .testimonials-header{margin-bottom:3rem;text-align:center}
    .testimonials-title{font-size:2rem}
    .testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .testimonial-card{background:white;border:1px solid var(--border);border-radius:1rem;padding:2rem}
    .testimonial-quote{font-family:var(--font-display);font-size:1.375rem;font-style:italic;line-height:1.55;margin-bottom:1.25rem}
    .testimonial-attr{font-size:.875rem;color:var(--muted-fg)}

    /* Process steps */
    .process-steps{padding:5rem 0}
    .process-steps-header{margin-bottom:3rem;text-align:center}
    .process-steps-title{font-size:2rem}
    .steps-grid{display:grid;gap:2rem}
    .step{text-align:center}
    .step-badge{width:3rem;height:3rem;border-radius:50%;background:var(--sage-deep);color:white;font-family:var(--font-display);font-size:1.25rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
    .step-title{font-size:1.25rem;font-family:var(--font-display);font-weight:500;margin-bottom:.625rem}
    .step-body{font-size:.9375rem;color:var(--muted-fg)}

    /* Credential strip */
    .credential-strip{padding:3rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .credential-grid{display:grid}
    .credential-item{padding:1.5rem;text-align:center}
    .credential-item+.credential-item{border-left:1px solid var(--border)}
    .credential-since{font-size:.75rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-deep);margin-bottom:.5rem}
    .credential-label{font-family:var(--font-display);font-size:1.375rem;font-weight:500}
    .credential-desc{font-size:.875rem;color:var(--muted-fg);margin-top:.375rem}

    /* Newsletter */
    .newsletter{padding:5rem 0;background:var(--muted);text-align:center}
    .newsletter-inner{max-width:36rem;margin:0 auto}
    .newsletter-title{font-size:2rem;margin-bottom:1rem}
    .newsletter-body{color:var(--muted-fg);margin-bottom:2rem}
    .newsletter-form{display:flex;gap:.75rem;justify-content:center}
    .newsletter-input{flex:1;max-width:20rem;padding:.625rem 1rem;border:1px solid var(--border);border-radius:9999px;font-family:var(--font-body);font-size:.9375rem}

    /* Inquiry form */
    .inquiry-form-section{padding:5rem 0}
    .inquiry-form-inner{max-width:44rem;margin:0 auto}
    .inquiry-title{font-size:2rem;margin-bottom:1rem}
    .inquiry-intro{color:var(--muted-fg);margin-bottom:2rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .form-field{display:flex;flex-direction:column;gap:.375rem;margin-bottom:1rem}
    .form-field label{font-size:.8125rem;font-weight:500;color:var(--muted-fg)}
    .form-field input,.form-field textarea{padding:.625rem 1rem;border:1px solid var(--border);border-radius:.5rem;font-family:var(--font-body);font-size:.9375rem;background:white}
    .form-field textarea{min-height:8rem;resize:vertical}

    /* Desktop-only grid columns (not set above) */
    .steps-grid{grid-template-columns:repeat(3,1fr)}
    .credential-grid{grid-template-columns:repeat(3,1fr)}

    /* Mobile breakpoint — mirrors Tailwind sm: (640px) & lg: (1024px) */
    @media(max-width:640px){
      .wrap{padding:0 1rem}
      /* Hero split: text stacks above image */
      .hero-split-inner{grid-template-columns:1fr}
      .hero-split-img{aspect-ratio:4/3;margin-top:1.5rem}
      /* About band: text below image */
      .about-band-grid{grid-template-columns:1fr}
      /* Services: 1 column on phone (sm: gives 2, but below 640px → 1) */
      .services-cards{grid-template-columns:1fr}
      .service-card.large{grid-column:span 1}
      .service-card.wide{flex-direction:column}
      .service-card.wide .service-card-img{width:100%;aspect-ratio:4/3}
      /* Gallery: 3 and 4 col → 2 col on mobile (matches grid-cols-2 lg:grid-cols-3/4) */
      .gallery-grid.cols-3,.gallery-grid.cols-4{grid-template-columns:repeat(2,1fr)}
      .gallery-grid.cols-2{grid-template-columns:1fr}
      /* Method cards */
      .method-cards-grid{grid-template-columns:1fr}
      /* Booking grid */
      .booking-grid-inner{grid-template-columns:1fr}
      /* Testimonials */
      .testimonials-grid{grid-template-columns:1fr}
      /* Credentials */
      .credential-grid{grid-template-columns:1fr}
      .credential-item+.credential-item{border-left:none;border-top:1px solid var(--border)}
      /* Process steps */
      .steps-grid{grid-template-columns:1fr}
      /* Inquiry form: name + email on separate rows */
      .form-row{grid-template-columns:1fr}
      /* CTA less padding */
      .cta-card{padding:2rem 1.25rem}
      /* Newsletter form stacks */
      .newsletter-form{flex-direction:column;align-items:stretch}
      .newsletter-input{max-width:100%}
    }
  `;

  return `<!DOCTYPE html><html lang="sv"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<base href="${location.origin}/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>${css}</style></head>
<body>
${bannerHtml}<header class="site-header"><div class="site-header-inner"><a class="site-brand" href="/">Marie Uhrbom</a></div></header>
<main>${sections}</main>
</body></html>`;
}

function renderSection(sec, contact) {
  switch (sec.type) {
    case 'hero-split':       return renderHeroSplit(sec);
    case 'hero-overlay':     return renderHeroOverlay(sec);
    case 'page-header':      return renderPageHeader(sec);
    case 'text':             return renderText(sec);
    case 'about-band':       return renderAboutBand(sec);
    case 'services-grid':    return renderServicesGrid(sec);
    case 'gallery':          return renderGallery(sec);
    case 'cta':              return renderCta(sec);
    case 'quote':            return renderQuote(sec);
    case 'info-card':        return renderInfoCard(sec);
    case 'method-cards':     return renderMethodCards(sec);
    case 'contact-card':     return renderContactCard(contact, sec);
    case 'booking-grid':     return renderBookingGrid(sec, contact);
    case 'inquiry-form':     return renderInquiryForm(sec);
    case 'testimonials':     return renderTestimonials(sec);
    case 'process-steps':    return renderProcessSteps(sec);
    case 'credential-strip': return renderCredentialStrip(sec);
    case 'newsletter-signup':return renderNewsletter(sec, contact);
    default: return `<section style="padding:2rem;text-align:center;color:var(--muted-fg);font-size:.875rem;border-bottom:1px solid var(--border)">— ${esc(sec.type)} —</section>`;
  }
}

function renderHeroSplit(sec) {
  const centered = sec.layout === 'centered';
  const bgOverlay = sec.bgImage ? `<div style="position:absolute;inset:0;z-index:0">${imgEl(sec.bgImage,'','width:100%;height:100%;object-fit:cover')}<div style="position:absolute;inset:0;background:linear-gradient(to right,var(--background) 35%,oklch(0.978 0.011 85/.6) 65%,transparent)"></div></div>` : '';
  const imageCol = (!centered && sec.image) ? `<div class="hero-split-img">${imgEl(sec.image, sec.alt)}</div>` : '';
  return `<section class="hero-split${centered?' centered':''}" style="position:relative">
    ${bgOverlay}
    <div class="wrap" style="position:relative;z-index:1">
      <div class="hero-split-inner">
        <div>
          ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
          <h1 class="hero-split-title">${esc(sec.title||'')}</h1>
          ${sec.subtitle?`<p class="hero-split-sub">${esc(sec.subtitle)}</p>`:''}
          ${sec.cta1Label||sec.cta2Label?`<div class="hero-split-ctas">${btnHtml(sec.cta1Label,sec.cta1Href)}${btnHtml(sec.cta2Label,sec.cta2Href,'btn-outline')}</div>`:''}
          ${sec.footnote?`<p class="hero-footnote">${esc(sec.footnote)}</p>`:''}
        </div>
        ${imageCol}
      </div>
    </div>
  </section>`;
}

function renderHeroOverlay(sec) {
  const bg = sec.image
    ? `<div class="hero-overlay-bg">${imgEl(sec.image,sec.alt)}</div><div class="hero-overlay-grad"></div>`
    : `<div class="hero-overlay-bg" style="background:var(--leather-deep)"></div>`;
  return `<section class="hero-overlay">
    ${bg}
    <div class="hero-overlay-content">
      <div class="hero-overlay-inner">
        ${sec.eyebrow?`<span class="eyebrow" style="color:rgba(255,255,255,.7)">${esc(sec.eyebrow)}</span>`:''}
        <h1 class="hero-overlay-title">${esc(sec.title||'')}</h1>
        ${sec.subtitle?`<p class="hero-overlay-sub">${esc(sec.subtitle)}</p>`:''}
        ${sec.cta1Label||sec.cta2Label?`<div style="display:flex;gap:.75rem;flex-wrap:wrap">${btnHtml(sec.cta1Label,sec.cta1Href)}${btnHtml(sec.cta2Label,sec.cta2Href,'btn-outline')}</div>`:''}
      </div>
    </div>
  </section>`;
}

function renderPageHeader(sec) {
  return `<section class="page-header">
    <div class="wrap"><div class="page-header-inner">
      ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
      <h1 class="page-header-title">${esc(sec.title||'')}</h1>
      ${sec.subtitle?`<p class="page-header-sub">${esc(sec.subtitle)}</p>`:''}
    </div></div>
  </section>`;
}

function renderText(sec) {
  return `<section class="text-section">
    <div class="wrap"><div class="text-section-inner prose">
      ${sec.title?`<h2 class="text-section-title">${esc(sec.title)}</h2>`:''}
      ${md(sec.body)}
    </div></div>
  </section>`;
}

function renderAboutBand(sec) {
  const hasImg = !!sec.image;
  const bgOverlay = sec.bgImage ? `<div style="position:absolute;inset:0;z-index:0">${imgEl(sec.bgImage,'','width:100%;height:100%;object-fit:cover')}<div style="position:absolute;inset:0;background:linear-gradient(to left,var(--background) 40%,oklch(0.978 0.011 85/.5))"></div></div>` : '';
  const imgCol = hasImg ? `<div class="about-band-img">${imgEl(sec.image,sec.alt)}</div>` : '';
  const gridStyle = hasImg ? '' : 'grid-template-columns:1fr;max-width:44rem;margin:0 auto';
  return `<section class="about-band" style="position:relative">
    ${bgOverlay}
    <div class="wrap" style="position:relative;z-index:1">
      <div class="about-band-grid" style="${gridStyle}">
        ${imgCol}
        <div>
          ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
          <h2 class="about-band-title">${esc(sec.title||'')}</h2>
          ${sec.body?`<div class="prose">${md(sec.body)}</div>`:''}
          ${sec.linkLabel?`<a href="${esc(sec.linkHref||'#')}" class="about-band-link">${esc(sec.linkLabel)} →</a>`:''}
        </div>
      </div>
    </div>
  </section>`;
}

function renderServicesGrid(sec) {
  const cards = (sec.items||[]).map(item => {
    const cls = item.size==='large'?' large':item.size==='wide'?' wide':'';
    return `<div class="service-card${cls}">
      ${item.image?`<div class="service-card-img">${imgEl(item.image,item.title)}</div>`:''}
      <div class="service-card-body">
        ${item.eyebrow?`<div class="service-card-eyebrow">${esc(item.eyebrow)}</div>`:''}
        <h3 class="service-card-title">${esc(item.title||'')}</h3>
        ${item.body?`<p class="service-card-text">${esc(item.body)}</p>`:''}
        ${item.linkLabel?`<a href="${esc(item.href||'#')}" class="service-card-link">${esc(item.linkLabel)} →</a>`:''}
      </div>
    </div>`;
  }).join('');
  return `<section class="services-grid">
    <div class="wrap">
      ${sec.eyebrow||sec.title||sec.subtitle?`<div class="services-grid-header">
        ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
        ${sec.title?`<h2 class="services-grid-title">${esc(sec.title)}</h2>`:''}
        ${sec.subtitle?`<p class="services-grid-sub">${esc(sec.subtitle)}</p>`:''}
      </div>`:''}
      <div class="services-cards">${cards}</div>
    </div>
  </section>`;
}

function renderGallery(sec) {
  const cols = sec.columns||'3';
  const items = (sec.images||[]).map(img=>`<div class="gallery-item">${imgEl(img.url,img.alt)}</div>`).join('');
  return `<section class="gallery">
    <div class="wrap">
      ${sec.eyebrow||sec.title?`<div class="gallery-header">
        ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
        ${sec.title?`<h2 class="gallery-title">${esc(sec.title)}</h2>`:''}
      </div>`:''}
      <div class="gallery-grid cols-${cols}">${items}</div>
    </div>
  </section>`;
}

function renderCta(sec) {
  const theme = sec.theme||'dark', align = sec.align||'center';
  return `<section class="cta-section">
    <div class="wrap">
      <div class="cta-card ${theme} ${align}">
        <h2 class="cta-title">${esc(sec.title||'')}</h2>
        ${sec.body?`<p class="cta-body">${esc(sec.body)}</p>`:''}
        ${sec.buttonLabel||sec.cta2Label?`<div class="cta-btns">${btnHtml(sec.buttonLabel,sec.buttonHref)}${btnHtml(sec.cta2Label,sec.cta2Href,'btn-outline')}</div>`:''}
      </div>
    </div>
  </section>`;
}

function renderQuote(sec) {
  return sec.variant==='hero'
    ? `<section class="quote-hero"><blockquote><p>${esc(sec.quote||'')}</p>${sec.attribution?`<footer>— ${esc(sec.attribution)}</footer>`:''}</blockquote></section>`
    : `<section class="quote-default"><div class="wrap"><blockquote><p>${esc(sec.quote||'')}</p>${sec.attribution?`<footer>— ${esc(sec.attribution)}</footer>`:''}</blockquote></div></section>`;
}

function renderInfoCard(sec) {
  return `<section class="info-card-section">
    <div class="wrap">
      <div class="info-card ${sec.tone||'soft'}">
        <h3 class="info-card-title">${esc(sec.title||'')}</h3>
        <div class="prose">${md(sec.body)}</div>
      </div>
    </div>
  </section>`;
}

function renderMethodCards(sec) {
  const icons = {
    info: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`,
    sparkles: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>`,
    shield: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  };
  const cards = (sec.items||[]).map(item=>`<div class="method-card">
    <div class="method-card-icon">${icons[item.icon]||icons.info}</div>
    <h3 class="method-card-title">${esc(item.title||'')}</h3>
    <div class="method-card-body prose">${md(item.body)}</div>
  </div>`).join('');
  return `<section class="method-cards"><div class="wrap"><div class="method-cards-grid">${cards}</div></div></section>`;
}

function renderContactCard(contact, sec) {
  const showConf = sec.showConfidentiality !== false;
  return `<section class="contact-card-section">
    <div class="wrap">
      <div class="contact-card">
        <h2 class="contact-card-title">Kontakt</h2>
        ${contact.email?`<div class="contact-row"><div class="contact-icon">✉</div><div><div class="contact-label">E-post</div><div class="contact-value">${esc(contact.email)}</div></div></div>`:''}
        ${contact.phone?`<div class="contact-row"><div class="contact-icon">☎</div><div><div class="contact-label">Telefon</div><div class="contact-value">${esc(contact.phone)}</div></div></div>`:''}
        ${contact.location?`<div class="contact-row"><div class="contact-icon">⌖</div><div><div class="contact-label">Plats</div><div class="contact-value">${esc(contact.location)}</div></div></div>`:''}
        ${showConf&&contact.confidentiality?`<div class="contact-conf">${esc(contact.confidentiality)}</div>`:''}
      </div>
    </div>
  </section>`;
}

function renderBookingGrid(sec, contact) {
  const sidebar = `<div class="contact-card">
    <h3 class="contact-card-title" style="font-size:1.125rem">Kontakt</h3>
    ${contact.email?`<div class="contact-row"><div class="contact-icon">✉</div><div><div class="contact-label">E-post</div><div class="contact-value">${esc(contact.email)}</div></div></div>`:''}
    ${contact.phone?`<div class="contact-row"><div class="contact-icon">☎</div><div><div class="contact-label">Telefon</div><div class="contact-value">${esc(contact.phone)}</div></div></div>`:''}
    ${contact.location?`<div class="contact-row"><div class="contact-icon">⌖</div><div><div class="contact-label">Plats</div><div class="contact-value">${esc(contact.location)}</div></div></div>`:''}
  </div>`;
  return `<section class="booking-grid-section"${sec.id?` id="${esc(sec.id)}"`:''}>
    <div class="wrap">
      <div class="booking-grid-inner">
        <div class="prose">${md(sec.body)}</div>
        <div style="position:sticky;top:2rem">${sidebar}</div>
      </div>
    </div>
  </section>`;
}

function renderInquiryForm(sec) {
  const nl = sec.nameLabel||'Namn', el = sec.emailLabel||'E-post';
  const sl = sec.subjectLabel||'Ämne', ml = sec.messageLabel||'Meddelande';
  const showSubject = sec.showSubject !== false;
  return `<section class="inquiry-form-section"${sec.id?` id="${esc(sec.id)}"`:''}>
    <div class="wrap"><div class="inquiry-form-inner">
      ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
      ${sec.title?`<h2 class="inquiry-title">${esc(sec.title)}</h2>`:''}
      ${sec.intro?`<p class="inquiry-intro">${esc(sec.intro)}</p>`:''}
      <div class="form-row">
        <div class="form-field"><label>${esc(nl)}</label><input type="text" placeholder="${esc(nl)}"></div>
        <div class="form-field"><label>${esc(el)}</label><input type="email" placeholder="${esc(el)}"></div>
      </div>
      ${showSubject?`<div class="form-field"><label>${esc(sl)}</label><input type="text" placeholder="${esc(sl)}"></div>`:''}
      <div class="form-field"><label>${esc(ml)}</label><textarea placeholder="${esc(sec.messagePlaceholder||ml)}"></textarea></div>
      <button type="button" class="btn-primary">${esc(sec.submitLabel||'Skicka')}</button>
    </div></div>
  </section>`;
}

function renderTestimonials(sec) {
  const cards = (sec.items||[]).map(item=>`<div class="testimonial-card">
    <p class="testimonial-quote">"${esc(item.quote||'')}"</p>
    ${item.attribution?`<footer class="testimonial-attr">— ${esc(item.attribution)}</footer>`:''}
  </div>`).join('');
  return `<section class="testimonials">
    <div class="wrap">
      ${sec.eyebrow||sec.title?`<div class="testimonials-header">
        ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
        ${sec.title?`<h2 class="testimonials-title">${esc(sec.title)}</h2>`:''}
      </div>`:''}
      <div class="testimonials-grid">${cards||`<p style="color:var(--muted-fg);text-align:center">Inga berättelser ännu.</p>`}</div>
    </div>
  </section>`;
}

function renderProcessSteps(sec) {
  const steps = sec.steps||[];
  const cols = Math.min(Math.max(steps.length,1),4);
  const cards = steps.map(s=>`<div class="step">
    <div class="step-badge">${esc(s.number||'')}</div>
    <h3 class="step-title">${esc(s.title||'')}</h3>
    ${s.body?`<p class="step-body">${esc(s.body)}</p>`:''}
  </div>`).join('');
  return `<section class="process-steps">
    <div class="wrap">
      ${sec.eyebrow||sec.title?`<div class="process-steps-header">
        ${sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:''}
        ${sec.title?`<h2 class="process-steps-title">${esc(sec.title)}</h2>`:''}
      </div>`:''}
      <div class="steps-grid" style="grid-template-columns:repeat(${cols},1fr)">${cards}</div>
    </div>
  </section>`;
}

function renderCredentialStrip(sec) {
  const items = sec.items||[];
  const cells = items.map(item=>`<div class="credential-item">
    ${item.since?`<div class="credential-since">${esc(item.since)}</div>`:''}
    <div class="credential-label">${item.href?`<a href="${esc(item.href)}" style="color:inherit;text-decoration:none">${esc(item.label||'')}</a>`:esc(item.label||'')}</div>
    ${item.description?`<div class="credential-desc">${esc(item.description)}</div>`:''}
  </div>`).join('');
  return `<section class="credential-strip">
    <div class="wrap">
      <div class="credential-grid" style="grid-template-columns:repeat(${Math.max(1,items.length)},1fr)">${cells}</div>
    </div>
  </section>`;
}

function renderNewsletter(sec, contact) {
  const showCheckboxes = !sec.area || sec.area === 'all';
  const areaLabel = sec.area === 'homeopati' ? 'Homeopati' : sec.area === 'coachning' ? 'Livscoachning' : sec.area === 'hantverk' ? 'Läderhantverk' : '';
  const contactEmail = contact?.email || '';
  const checkboxes = showCheckboxes
    ? `<div style="margin-bottom:.25rem"><p style="font-size:.875rem;font-weight:500;margin-bottom:.625rem">Jag är intresserad av <span style="color:var(--destructive)">*</span></p><div style="display:flex;flex-direction:column;gap:.5rem"><label style="display:flex;align-items:center;gap:.625rem;font-size:.875rem;cursor:default"><input type="checkbox" disabled> Homeopati</label><label style="display:flex;align-items:center;gap:.625rem;font-size:.875rem;cursor:default"><input type="checkbox" disabled> Hälsa &amp; Livscoachning</label><label style="display:flex;align-items:center;gap:.625rem;font-size:.875rem;cursor:default"><input type="checkbox" disabled> Läderhantverk</label></div></div>`
    : `<p style="font-size:.8125rem;color:var(--muted-fg);margin-bottom:.25rem">(Prenumererar på: ${esc(areaLabel)})</p>`;
  return `<section class="newsletter"${sec.id?` id="${esc(sec.id)}"`:''}>`
    + `<div class="newsletter-inner">`
    + (sec.eyebrow?`<span class="eyebrow">${esc(sec.eyebrow)}</span>`:'')
    + (sec.title?`<h2 class="newsletter-title">${esc(sec.title)}</h2>`:'')
    + (sec.body?`<p class="newsletter-body">${esc(sec.body)}</p>`:'')
    + `<div style="text-align:left;max-width:26rem;margin:0 auto;display:flex;flex-direction:column;gap:.875rem">`
    + `<div><label style="display:block;font-size:.8125rem;font-weight:500;color:var(--muted-fg);margin-bottom:.375rem">E-postadress <span style="color:var(--destructive)">*</span></label><input type="email" placeholder="din@epost.se" style="width:100%;padding:.625rem 1rem;border:1px solid var(--border);border-radius:.5rem;font-family:var(--font-body);font-size:.9375rem;background:white"></div>`
    + checkboxes
    + `<label style="display:flex;align-items:flex-start;gap:.625rem;font-size:.8125rem;color:var(--muted-fg);cursor:default"><input type="checkbox" style="margin-top:.125rem;flex-shrink:0" disabled><span>Jag godkänner att min e-postadress sparas för nyhetsbrev från Marie Uhrbom. Jag kan när som helst avsluta prenumerationen. <span style="color:var(--destructive)">*</span></span></label>`
    + `<div><button type="button" class="btn-primary">Prenumerera</button></div>`
    + (contactEmail?`<p style="font-size:.75rem;color:var(--muted-fg);margin-top:.5rem">Vid fel visas: "kontakta mig direkt på ${esc(contactEmail)}"</p>`:'')
    + `</div>`
    + `</div></section>`;
}

/* ── Init ─────────────────────────────────────────────────────── */

function init() {
  try {
    const stored = localStorage.getItem('marie-admin-cfg');
    if (stored) cfg = JSON.parse(stored);
  } catch { cfg = {}; }

  if (cfg.pat && cfg.owner && cfg.repo) {
    loadPageList();
  } else {
    showLoginScreen();
  }
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/admin/sw.js');
}
</script>
</body>
</html>
